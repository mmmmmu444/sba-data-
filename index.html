<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料管理系統 (含圖片壓縮)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4f46e5; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 400px 1fr; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; font-size: 1.25rem; color: var(--primary); border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; color: #64748b; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #94a3b8; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: white; }
        th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .thumb { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; }
        #status-msg { font-size: 0.75rem; color: #6366f1; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>錄入資料 (自動壓縮)</h2>
        <div class="form-group">
            <label>名稱 (name)</label>
            <input type="text" id="name">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>創作年份 (create_time)</label>
                <input type="text" id="create_time">
            </div>
            <div class="form-group">
                <label>圖片 (_images)</label>
                <input type="file" id="file-upload" accept="image/*">
                <span id="status-msg"></span>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>分類 1 *</label><input type="text" id="sort_1" required></div>
            <div class="form-group"><label>分類 2</label><input type="text" id="sort_2"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>媒介 1 *</label><input type="text" id="medium_1" required></div>
            <div class="form-group"><label>媒介 2</label><input type="text" id="medium_2"></div>
        </div>
        <div class="form-group">
            <label>標籤</label>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="tag_1" placeholder="T1">
                <input type="text" id="tag_2" placeholder="T2">
                <input type="text" id="tag_3" placeholder="T3">
            </div>
        </div>
        <button onclick="handleSubmission()" id="submit-btn">儲存並上傳</button>
    </div>

    <div class="card">
        <h2>資料清單</h2>
        <table id="data-table">
            <thead>
                <tr>
                    <th>預覽</th>
                    <th>年份</th>
                    <th>名稱</th>
                    <th>標籤</th>
                    <th>媒介</th>
                </tr>
            </thead>
            <tbody id="data-list"></tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://radatxqulgsuihwizmiv.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_001YvHQRMtLu7jFYdhymiA_5xxoik_v';
    const supabase = lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- 圖片壓縮核心函數 ---
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    // 限制最大寬度為 1200 像素
                    const MAX_WIDTH = 1200;
                    if (width > MAX_WIDTH) {
                        height = (MAX_WIDTH / width) * height;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // 輸出為 jpeg 並設定品質為 0.7 (70%)
                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, 'image/jpeg', 0.7);
                };
            };
        });
    }

    function renderRow(item) {
        const tbody = document.getElementById('data-list');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.file_url ? `<img src="${item.file_url}" class="thumb">` : 'N/A'}</td>
            <td>${item.create_time || '-'}</td>
            <td>${item.name || '-'}</td>
            <td>${item.tag_1 || ''} ${item.tag_2 || ''}</td>
            <td>${item.medium_1 || ''}</td>
        `;
        tbody.prepend(tr);
    }

    async function loadData() {
        const { data, error } = await _supabase.from('data').select('*').order('created_at', { ascending: true });
        if (!error && data) {
            document.getElementById('data-list').innerHTML = '';
            data.forEach(renderRow);
        }
    }

    async function handleSubmission() {
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status-msg');
        const fileInput = document.getElementById('file-upload');
        const originalFile = fileInput.files[0];

        const payload = {
            name: document.getElementById('name').value || null,
            create_time: document.getElementById('create_time').value || null,
            sort_1: document.getElementById('sort_1').value,
            sort_2: document.getElementById('sort_2').value || null,
            medium_1: document.getElementById('medium_1').value,
            medium_2: document.getElementById('medium_2').value || null,
            tag_1: document.getElementById('tag_1').value || null,
            tag_2: document.getElementById('tag_2').value || null,
            tag_3: document.getElementById('tag_3').value || null,
            file_url: null
        };

        if (!payload.sort_1 || !payload.medium_1) return alert('必填欄位缺失');

        btn.disabled = true;
        
        try {
            if (originalFile) {
                status.innerText = '正在壓縮並上傳...';
                
                // 執行壓縮
                const compressedBlob = await compressImage(originalFile);
                const fileName = `${Date.now()}.jpg`;

                // 上傳壓縮後的 Blob
                const { error: uploadError } = await _supabase.storage
                    .from('_images')
                    .upload(fileName, compressedBlob, { contentType: 'image/jpeg' });

                if (uploadError) throw uploadError;

                const { data: urlData } = _supabase.storage.from('_images').getPublicUrl(fileName);
                payload.file_url = urlData.publicUrl;
            }

            const { error: dbError } = await _supabase.from('data').insert([payload]);
            if (dbError) throw dbError;

            // 清空
            fileInput.value = '';
            status.innerText = '上傳成功！';
            loadData();
        } catch (err) {
            alert('錯誤: ' + err.message);
        } finally {
            btn.disabled = false;
        }
    }

    loadData();
</script>
</body>
</html>
